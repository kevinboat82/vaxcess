databases:
  - name: vaxcess-db
    plan: free
    region: oregon
    databaseName: vaxcess_db
    user: vaxcess_user

services:
  # Express API Backend
  - type: web
    name: vaxcess-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build && npm run init-db:prod && npm run seed:prod
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaxcess-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false

  # React + Vite Frontend
  - type: web
    name: vaxcess-frontend
    runtime: static
    buildCommand: cd admin-dashboard && npm install && npm run build
    staticPublishPath: admin-dashboard/dist
    envVars:
      - key: VITE_API_URL
        value: /api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://vaxcess-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
