services:
  # Managed PostgreSQL Database
  - type: database
    name: vaxcess-db
    plan: free
    region: oregon
    databaseName: vaxcess_db
    user: vaxcess_user

  # Express API Backend
  - type: web
    name: vaxcess-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaxcess-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # React + Vite Frontend
  - type: static
    name: vaxcess-frontend
    runtime: static
    plan: free
    region: oregon
    buildCommand: cd admin-dashboard && npm install && npm run build
    staticPublishPath: admin-dashboard/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vaxcess-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
