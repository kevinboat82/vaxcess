server {
    listen 80;

    # Where Nginx looks for the compiled React static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 1. Frontend Routing Rule
    # Any traffic that hits the root tries to find the physical file,
    # otherwise it falls back to index.html to let React Router take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend Reverse Proxy Rule
    # Any traffic starting with /api is silently forwarded to our Node.js Backend container
    # This prevents CORS errors since the browser thinks everything comes from Nginx!
    location /api/ {
        # 'backend' will be the name of the service inside docker-compose.yml
        proxy_pass http://backend:3000/api/;
        
        # Pass along original headers to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Don't cache index.html to ensure users always get the latest Single Page App version
    location = /index.html {
        expires -1;
    }
}
